<svg width="1200" height="525" viewBox="0 0 1200 525" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="525" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1225"/>
      <stop offset="1" stop-color="#07091A"/>
    </linearGradient>
    <radialGradient id="f1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 165) rotate(18) scale(600 340)">
      <stop stop-color="#7DD3FC" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 385) rotate(-12) scale(600 340)">
      <stop stop-color="#A78BFA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="180" y1="120" x2="1040" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="525" rx="40" fill="url(#bg)"/>
  <rect width="1200" height="525" rx="40" fill="url(#f1)"/>
  <rect width="1200" height="525" rx="40" fill="url(#f2)"/>

  <!-- Frontend: responsive UI + components + performance -->
  <g filter="url(#glow)" stroke="url(#stroke)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Desktop -->
    <rect x="210" y="140" width="700" height="300" rx="26" fill="none"/>
    <path d="M210 190h700" opacity="0.75"/>
    <circle cx="255" cy="165" r="8" fill="#0F172A" stroke="#A78BFA" stroke-width="5"/>
    <circle cx="285" cy="165" r="8" fill="#0F172A" stroke="#60A5FA" stroke-width="5"/>
    <circle cx="315" cy="165" r="8" fill="#0F172A" stroke="#22D3EE" stroke-width="5"/>

    <!-- Content blocks -->
    <rect x="250" y="220" width="250" height="180" rx="22" fill="none" opacity="0.9"/>
    <rect x="520" y="220" width="350" height="90" rx="22" fill="none" opacity="0.9"/>
    <rect x="520" y="330" width="220" height="50" rx="18" fill="none" opacity="0.85"/>
    <rect x="750" y="330" width="120" height="50" rx="18" fill="none" opacity="0.8"/>

    <!-- Mobile -->
    <rect x="950" y="180" width="170" height="260" rx="30" fill="none" opacity="0.9"/>
    <path d="M950 230h170" opacity="0.7"/>
  </g>

  <!-- Component tree -->
  <g filter="url(#glow)" stroke="url(#stroke)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <circle cx="560" cy="120" r="10" fill="#0F172A" stroke="#93C5FD" stroke-width="5"/>
    <circle cx="500" cy="90" r="9" fill="#0F172A" stroke="#A78BFA" stroke-width="5"/>
    <circle cx="620" cy="90" r="9" fill="#0F172A" stroke="#60A5FA" stroke-width="5"/>
    <path d="M560 110V100" />
    <path d="M560 100L500 90" />
    <path d="M560 100L620 90" />
  </g>

  <!-- Performance gauge -->
  <g filter="url(#glow)" stroke="url(#stroke)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <path d="M940 120c40 0 72 32 72 72" />
    <path d="M940 120c-40 0-72 32-72 72" opacity="0.55"/>
    <path d="M940 192l40-40" />
    <circle cx="940" cy="192" r="10" fill="#0F172A" stroke="#A78BFA" stroke-width="5"/>
  </g>
</svg>

