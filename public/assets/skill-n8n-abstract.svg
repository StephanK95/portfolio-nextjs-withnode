<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="30" y1="30" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1225"/>
      <stop offset="1" stop-color="#0A091A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(92 86) rotate(20) scale(120 100)">
      <stop stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(190 170) rotate(-10) scale(120 90)">
      <stop stop-color="#60A5FA" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="60" y1="70" x2="220" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <rect width="256" height="256" rx="32" fill="url(#glow1)"/>
  <rect width="256" height="256" rx="32" fill="url(#glow2)"/>

  <g filter="url(#softGlow)" stroke="url(#line)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M68 92 C 86 66, 126 58, 150 78" opacity="0.95"/>
    <path d="M150 78 C 175 98, 182 126, 166 148" opacity="0.95"/>
    <path d="M166 148 C 145 178, 110 188, 86 166" opacity="0.9"/>
    <path d="M86 166 C 74 156, 70 138, 74 120" opacity="0.85"/>
    <path d="M74 120 C 80 108, 92 100, 108 98" opacity="0.85"/>
  </g>

  <g>
    <circle cx="76" cy="120" r="18" fill="#0F172A" stroke="#C4B5FD" stroke-width="5"/>
    <circle cx="108" cy="98" r="16" fill="#0F172A" stroke="#93C5FD" stroke-width="5"/>
    <circle cx="150" cy="78" r="20" fill="#0F172A" stroke="#A78BFA" stroke-width="5"/>
    <circle cx="166" cy="148" r="20" fill="#0F172A" stroke="#60A5FA" stroke-width="5"/>
    <circle cx="86" cy="166" r="18" fill="#0F172A" stroke="#7C3AED" stroke-width="5"/>
  </g>
</svg>

